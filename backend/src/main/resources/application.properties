spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/smart_logistics}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:ChangeThisSecretKeyToSomethingStrongAndLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:28800000}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false

default.admin.username=${DEFAULT_ADMIN_USERNAME:admin}
default.admin.password=${DEFAULT_ADMIN_PASSWORD:admin123}

server.port=${SERVER_PORT:8080}